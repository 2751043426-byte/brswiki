<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后室维基</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/wiki.css">
    <link rel="stylesheet" href="css/messages.css">
    <link rel="stylesheet" href="css/effects.css">
</head>
<body>
    <div id="app">
        <nav id="sidebar">
            <div class="logo"><h1>后室维基</h1><span class="subtitle">The Backrooms Encyclopedia</span></div>
            <ul class="nav-links">
                <li><a href="#/home" data-page="home">首页</a></li>
                <li><a href="#/level-0" data-page="level-0">Level 0</a></li>
                <li><a href="#/level-1" data-page="level-1">Level 1</a></li>
                <li><a href="#/level-2" data-page="level-2">Level 2</a></li>
                <li><a href="#/level-3" data-page="level-3">Level 3</a></li>
                <li><a href="#/entities" data-page="entities">实体</a></li>
                <li><a href="#/meg" data-page="meg">M.E.G.</a></li>
                <li><a href="#/messages" data-page="messages">消息</a></li>
            </ul>
            <div class="search-box"><input type="text" placeholder="搜索条目..." id="search-input"></div>
            <div class="sidebar-footer"><p>v47.2 · 1,247 条目</p></div>
        </nav>
        <main id="content"></main>
        <div id="message-popup" class="hidden">
            <div class="popup-content">
                <div class="popup-header"><span class="popup-sender"></span><button class="popup-close">×</button></div>
                <div class="popup-body"></div>
                <div class="popup-input-area"><input type="text" placeholder="回复..." id="reply-input"><button id="reply-btn">发送</button></div>
            </div>
        </div>
        <div id="edit-notice" class="hidden">
            <div class="edit-notice-inner">
                <span class="edit-label">最后编辑:</span>
                <span class="edit-author"></span>
                <span class="edit-time"></span>
                <div class="edit-preview"></div>
            </div>
        </div>
        <div id="toast" class="hidden"></div>
    </div>
    <div id="ending-overlay" class="hidden">
        <div class="ending-content">
            <h1 id="ending-title"></h1>
            <div id="ending-text"></div>
        </div>
    </div>
    <script src="js/decode.js"></script>
    <script src="js/data/pages.js"></script>
    <script src="js/data/story.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
